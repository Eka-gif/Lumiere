<div class="container">


 $ <div class="back-button">
    <a routerLink="/login">⬅</a>
  </div>

  <h2 class="page-title">Créer un compte</h2>

  <div class="register-card">


    <div class="form-group">

      <label>Nom d'utilisateur</label>

      <input
        [(ngModel)]="user.username"
        name="username"
        #username="ngModel"
        required
        placeholder="Entrez votre username"
        [class.invalid]="username.invalid && username.touched"
        [class.valid]="username.valid"
      >

      <small *ngIf="username.invalid && username.touched" class="error">
        Username obligatoire
      </small>

    </div>



    <div class="form-group">

      <label>Mot de passe</label>

      <div class="password-field">

        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="user.password"
          name="password"
          #password="ngModel"
          required
          minlength="4"
          placeholder="Entrez votre mot de passe"
          [class.invalid]="password.invalid && password.touched"
          [class.valid]="password.valid"
        >

        <span
          class="toggle-password"
          (click)="showPassword = !showPassword"
        >
          {{ showPassword ? '🙈' : '👁️' }}
        </span>

      </div>

      <small *ngIf="password.invalid && password.touched" class="error">
        Mot de passe minimum 4 caractères
      </small>

    </div>


    <div class="form-group">

      <label>Confirmer le mot de passe</label>

      <input
        type="password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        #confirm="ngModel"
        required
        placeholder="Confirmez votre mot de passe"
        [class.invalid]="confirm.invalid && confirm.touched"
        [class.valid]="confirm.valid"
      >

      <small *ngIf="confirm.invalid && confirm.touched" class="error">
        Confirmation obligatoire
      </small>

    </div>



    <button
      (click)="register()"
      [disabled]="username.invalid || password.invalid"
    >
      Créer le compte
    </button>

    <p class="message" *ngIf="message">{{message}}</p>

    <p class="login-link">
      Déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>

  </div>

</div>
