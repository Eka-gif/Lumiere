<div class="login-container">

  <div class="login-card">

    <h2>Connexion</h2>

    <form (ngSubmit)="login()" #loginForm="ngForm">

      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          class="form-control">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          class="form-control">
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="btn-login">
        Se connecter
      </button>

      <p *ngIf="errorMessage" class="error">
        {{ errorMessage }}
      </p>

    </form>

  </div>

</div>
