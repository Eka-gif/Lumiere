<div class="container">

  <h2 class="page-title">Historique des actions</h2>

  <table>

    <thead>

    <tr>
      <th>Date</th>
      <th>Utilisateur</th>
      <th>Action</th>
      <th>Entité</th>
    </tr>

    </thead>

    <tbody>

    <tr *ngFor="let log of logs">

      <td>{{ log.date | date:'dd/MM/yyyy HH:mm' }}</td>

      <td>{{ log.username }}</td>

      <td>{{ log.action }}</td>

      <td>{{ log.entity }}</td>

    </tr>

    </tbody>

  </table>

</div>
